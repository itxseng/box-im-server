spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${JDBC_URL}                           # e.g. jdbc:mysql://host:port/db?…
    username: ${JDBC_USERNAME}                # e.g. root
    password: ${JDBC_PASSWORD}

  flyway:
    enabled: false
    locations: classpath:db/migration
    baseline-on-migrate: true
    out-of-order: false
    validate-on-migrate: true

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}
      database: ${REDIS_DATABASE}
    mongodb:
      uri: ${MONGODB_URI}                      # e.g. mongodb://user:pass@host:27017/…?authSource=admin

storage:
  type: minio
  minio:
    endpoint: ${MINIO_ENDPOINT}                # 内网地址或域名
    domain:   ${MINIO_PUBLIC_DOMAIN}           # 对外访问地址
    accessKey: ${MINIO_ACCESS_KEY}
    secretKey: ${MINIO_SECRET_KEY}
    bucketName: ${MINIO_BUCKET}
    imagePath: image
    filePath: file
    videoPath: video
    expireIn: 180

  s3:
    accessKey: ${AWS_ACCESS_KEY_ID}
    secretKey: ${AWS_SECRET_ACCESS_KEY}
    bucketName: ${AWS_S3_BUCKET}
    region: ${AWS_S3_REGION}
    domain: ${AWS_S3_DOMAIN}
    imagePath: image
    filePath: file
    videoPath: video

webrtc:
  max-channel: 9
  iceServers:
    - urls: stun:stun.l.google.com:19302
    - urls: stun:stun1.l.google.com:19302
    - urls: stun:stun2.l.google.com:19302

sms:
  platform: aliyun
  access-key: ${ALIYUN_SMS_ACCESS_KEY}
  secret-key: ${ALIYUN_SMS_SECRET_KEY}
  sign-name: ${SMS_SIGN_NAME}
  template-id: ${SMS_TEMPLATE_ID}

mail:
  host: ${MAIL_HOST}
  port: ${MAIL_PORT}
  ssl: ${MAIL_SSL}                           # true or false
  name: ${MAIL_FROM_NAME}
  from: ${MAIL_FROM_ADDRESS}
  pass: ${MAIL_PASSWORD}
  subject: ${MAIL_SUBJECT}
  content: ${MAIL_CONTENT}

registration:
  mode:
    - phone
    - email
